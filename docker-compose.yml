services:
  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: local
      AI_PROVIDER: mock
      STORE_RAW_FILES: "false"
    ports: ["8080:8080"]
  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports: ["5173:80"]
    depends_on: [backend]
