spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/securestack}
    username: ${SPRING_DATASOURCE_USERNAME:securestack}
    password: ${SPRING_DATASOURCE_PASSWORD:securestack}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
